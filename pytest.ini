[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Affichage verbose par défaut
addopts = -v --tb=short

# Marqueurs personnalisés
markers =
    llm: tests nécessitant une clé API LLM (skippés sans clé valide)
    slow: tests lents (chargement de la KB étendue)

# Ignorer les avertissements rdflib non critiques
filterwarnings =
    ignore::DeprecationWarning:rdflib
    ignore::UserWarning:owlready2
